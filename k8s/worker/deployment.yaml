apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: job-scheduler
  labels:
    app: worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: job-scheduler-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: job-scheduler-config
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import redis; r = redis.Redis(host='redis.job-scheduler.svc.cluster.local'); r.ping()"
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
      terminationGracePeriodSeconds: 60
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker-hpa
  namespace: job-scheduler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
